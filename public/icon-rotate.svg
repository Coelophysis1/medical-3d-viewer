<svg xmlns="http://www.w3.org/2000/svg" viewBox="8 5 72 76" fill="none">
  <!-- 垂直旋转轴 -->
  <line x1="44" y1="10" x2="44" y2="74" stroke="#6B7280" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 轴顶端小圆 -->
  <circle cx="44" cy="10" r="2.5" fill="#6B7280"/>
  <!-- 轴底端小圆 -->
  <circle cx="44" cy="74" r="2.5" fill="#6B7280"/>
  <!-- 后半椭圆轨迹（虚线，远离观察者） -->
  <path d="M20,42 A24,8 0 0 1 68,42" stroke="#6B7280" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.35" stroke-dasharray="5 3.5"/>
  <!-- 前半椭圆轨迹（实线，靠近观察者） -->
  <path d="M68,42 A24,8 0 0 1 20,42" stroke="#6B7280" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- 逆时针箭头（在前半弧左端点处） -->
  <polygon points="18,42 26,36 26,48" fill="#6B7280"/>
</svg>